apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: docker-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: TON_USER/docker-lab-backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: database
        - name: PORT
          value: "3000"
        envFrom:
        - secretRef:
            name: db-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: docker-lab
spec:
  selector:
    app: backend
  ports:
  - port: 3000